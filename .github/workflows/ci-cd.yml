name: LocalServe CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  test-and-build:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck workspaces
        run: npm run typecheck

      - name: Test API
        run: npm run test --workspace @localserve/api

      - name: Build API and web
        run: npm run build

  deploy-api-cloud-run:
    name: Deploy API to Cloud Run
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    env:
      GCP_REGION: ${{ secrets.GCP_REGION }}
      CLOUD_RUN_SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}
      DOCKER_REPOSITORY: localserve-api
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API image
        run: |
          IMAGE_NAME="${{ secrets.DOCKER_USERNAME }}/${DOCKER_REPOSITORY}"
          IMAGE_URI="${IMAGE_NAME}:${GITHUB_SHA}"
          LATEST_IMAGE_URI="${IMAGE_NAME}:latest"
          echo "Publishing API image to Docker Hub repository: ${IMAGE_NAME}"
          docker build -f apps/api/Dockerfile -t "${IMAGE_URI}" .
          docker tag "${IMAGE_URI}" "${LATEST_IMAGE_URI}"
          docker push "${IMAGE_URI}"
          docker push "${LATEST_IMAGE_URI}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "${GITHUB_ENV}"

      - name: Sync runtime secrets to Secret Manager
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_PHONE: ${{ secrets.TWILIO_FROM_PHONE }}
          STORAGE_ACCESS_KEY_ID: ${{ secrets.STORAGE_ACCESS_KEY_ID }}
          STORAGE_SECRET_ACCESS_KEY: ${{ secrets.STORAGE_SECRET_ACCESS_KEY }}
        run: |
          sync_secret() {
            local name="$1"
            local value="$2"
            if [ -z "${value}" ]; then
              echo "Missing value for ${name}" >&2
              exit 1
            fi
            if gcloud secrets describe "${name}" --project="${GCP_PROJECT_ID}" >/dev/null 2>&1; then
              printf "%s" "${value}" | gcloud secrets versions add "${name}" --project="${GCP_PROJECT_ID}" --data-file=-
            else
              printf "%s" "${value}" | gcloud secrets create "${name}" --project="${GCP_PROJECT_ID}" --replication-policy=automatic --data-file=-
            fi
          }

          sync_secret "MONGODB_URI" "${MONGODB_URI}"
          sync_secret "REDIS_URL" "${REDIS_URL}"
          sync_secret "JWT_SECRET" "${JWT_SECRET}"
          sync_secret "RAZORPAY_WEBHOOK_SECRET" "${RAZORPAY_WEBHOOK_SECRET}"
          sync_secret "RAZORPAY_KEY_ID" "${RAZORPAY_KEY_ID}"
          sync_secret "RAZORPAY_KEY_SECRET" "${RAZORPAY_KEY_SECRET}"
          sync_secret "SMTP_USER" "${SMTP_USER}"
          sync_secret "SMTP_PASS" "${SMTP_PASS}"
          sync_secret "TWILIO_ACCOUNT_SID" "${TWILIO_ACCOUNT_SID}"
          sync_secret "TWILIO_AUTH_TOKEN" "${TWILIO_AUTH_TOKEN}"
          sync_secret "TWILIO_FROM_PHONE" "${TWILIO_FROM_PHONE}"
          sync_secret "STORAGE_ACCESS_KEY_ID" "${STORAGE_ACCESS_KEY_ID}"
          sync_secret "STORAGE_SECRET_ACCESS_KEY" "${STORAGE_SECRET_ACCESS_KEY}"

      - name: Deploy Cloud Run service
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          PUBLIC_APP_URL: ${{ secrets.PUBLIC_APP_URL }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          STORAGE_BUCKET: ${{ secrets.STORAGE_BUCKET }}
          STORAGE_ENDPOINT: ${{ secrets.STORAGE_ENDPOINT }}
          STORAGE_REGION: ${{ secrets.STORAGE_REGION }}
          STORAGE_PUBLIC_BASE_URL: ${{ secrets.STORAGE_PUBLIC_BASE_URL }}
        run: |
          require_env() {
            local name="$1"
            if [ -z "${!name}" ]; then
              echo "Missing value for ${name}" >&2
              exit 1
            fi
          }

          for name in GCP_PROJECT_ID PUBLIC_APP_URL CORS_ORIGIN EMAIL_FROM SMTP_HOST SMTP_PORT SMTP_SECURE STORAGE_BUCKET STORAGE_ENDPOINT STORAGE_REGION STORAGE_PUBLIC_BASE_URL; do
            require_env "${name}"
          done

          gcloud run deploy "${CLOUD_RUN_SERVICE}" \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --image="${IMAGE_URI}" \
            --platform=managed \
            --allow-unauthenticated \
            --port=4000 \
            --min-instances=0 \
            --max-instances=3 \
            --memory=512Mi \
            --cpu=1 \
            --set-env-vars="^|^NODE_ENV=production|USE_MONGO=true|PUBLIC_APP_URL=${PUBLIC_APP_URL}|CORS_ORIGIN=${CORS_ORIGIN}|EMAIL_FROM=${EMAIL_FROM}|SMTP_HOST=${SMTP_HOST}|SMTP_PORT=${SMTP_PORT}|SMTP_SECURE=${SMTP_SECURE}|STORAGE_BUCKET=${STORAGE_BUCKET}|STORAGE_ENDPOINT=${STORAGE_ENDPOINT}|STORAGE_REGION=${STORAGE_REGION}|STORAGE_PUBLIC_BASE_URL=${STORAGE_PUBLIC_BASE_URL}" \
            --set-secrets="MONGODB_URI=MONGODB_URI:latest,REDIS_URL=REDIS_URL:latest,JWT_SECRET=JWT_SECRET:latest,RAZORPAY_WEBHOOK_SECRET=RAZORPAY_WEBHOOK_SECRET:latest,RAZORPAY_KEY_ID=RAZORPAY_KEY_ID:latest,RAZORPAY_KEY_SECRET=RAZORPAY_KEY_SECRET:latest,SMTP_USER=SMTP_USER:latest,SMTP_PASS=SMTP_PASS:latest,TWILIO_ACCOUNT_SID=TWILIO_ACCOUNT_SID:latest,TWILIO_AUTH_TOKEN=TWILIO_AUTH_TOKEN:latest,TWILIO_FROM_PHONE=TWILIO_FROM_PHONE:latest,STORAGE_ACCESS_KEY_ID=STORAGE_ACCESS_KEY_ID:latest,STORAGE_SECRET_ACCESS_KEY=STORAGE_SECRET_ACCESS_KEY:latest"

      - name: Show deployed URL
        run: |
          gcloud run services describe "${CLOUD_RUN_SERVICE}" \
            --region="${GCP_REGION}" \
            --format='value(status.url)'
